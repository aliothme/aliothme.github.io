<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split View 1</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #e3f2fd; }
        button { padding: 15px; font-size: 18px; margin: 10px; }
        #status { margin-top: 20px; padding: 10px; background: #fff; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Split View 1 (Utama)</h1>
    <p>Window ini bisa diminta masuk fullscreen dari window lain.</p>

    <button id="openSplit2">Buka Split View 2</button>

    <button id="requestFullscreen">Request Fullscreen (di window ini)</button>

    <button onclick="window.open('https://aliothme.github.io/split2.html', '_blank')">
    Buka Split2 di Window Baru (drag ke split manual)
    </button>

    <div id="status">Status: Siap</div>

    <script>
        let split2Window = null;

        document.getElementById('openSplit2').addEventListener('click', () => {
            // Membuka window baru (akan jadi split view jika user drag di Android/iPad)
            split2Window = window.open('split2.html', '_blank', 'width=600,height=800');
            
            if (split2Window) {
                document.getElementById('status').textContent = 'Status: Split View 2 berhasil dibuka';
            } else {
                document.getElementById('status').textContent = 'Status: Popup diblokir! Izinkan popup.';
            }
        });

        document.getElementById('requestFullscreen').addEventListener('click', () => {
            document.documentElement.requestFullscreen()
                .then(() => {
                    document.getElementById('status').textContent = 'Status: Berhasil masuk fullscreen (dari gesture di window ini)';
                })
                .catch(err => {
                    document.getElementById('status').textContent = `Status: Gagal fullscreen: ${err.message}`;
                });
        });

        // Menerima pesan dari split2.html untuk mencoba fullscreen
        window.addEventListener('message', (event) => {
            if (event.data === 'requestFullscreenFromSplit2') {
                document.documentElement.requestFullscreen()
                    .then(() => {
                        document.getElementById('status').textContent = 'Status: Fullscreen BERHASIL dari gesture di Split View 2!';
                    })
                    .catch(err => {
                        document.getElementById('status').textContent = `Status: Fullscreen GAGAL meski ada gesture di window lain: ${err.message}`;
                    });
            }
        });
    </script>
</body>
</html>
