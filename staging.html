<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple PWA Example - Developer Mode Activated</title>
    <!-- Link ke manifest.json -->
    <link rel="manifest" href="manifest.json" />
    <!-- Ikon buat app -->
    <link rel="icon" href="icon.png" type="image/png" />
  </head>
  <body>
    <h1>Welcome to PWA Example! Ready to Exploit?</h1>
    <p>Click the button below to open a popup for the install process.</p>
    <button id="installButton" style="display: none;">Install App - Click Me!</button>
    <script>
      let deferredPrompt; // Store beforeinstallprompt event

      // Function to open popup with custom URL
      function openPopupWindow(url) {
        return window.open(url, '_blank', 'width=600,height=400,left=300,top=200,menubar=no,toolbar=no,location=no,status=no,resizable=no');
      }

      // Listen to beforeinstallprompt event and store it
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById("installButton").style.display = "block"; // Show install button
      });

      // Handle click on install button
      document.getElementById("installButton").addEventListener("click", () => {
        if (deferredPrompt) {
          const popupUrl = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'install=1';
          const popup = openPopupWindow(popupUrl);
        }
      });

      // Trigger install flow when popup is loaded
      window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('install') === '1') {
          let localDeferredPrompt;
          window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            localDeferredPrompt = e;
            triggerInstallInPopup(localDeferredPrompt);
          });

          // Fake UI in popup
          document.body.innerHTML = `
            <h1>Welcome to Fake Install Flow</h1>
            <p>Click Confirm to Install!</p>
          `;
          document.getElementById("installButton")?.remove();
        }
      });

      // Trigger install in popup with delay and confirm prompt
      async function triggerInstallInPopup(localDeferredPrompt) {
        if (localDeferredPrompt) {
          await new Promise(resolve => setTimeout(resolve, 50)); // Delay before prompt
          const userInput = confirm("Click OK to install this app.");
          if (userInput) {
            localDeferredPrompt.prompt();
            const { outcome } = await localDeferredPrompt.userChoice;
            console.log(`User choice: ${outcome}`);
            localDeferredPrompt = null;
            if (outcome === 'accepted') {
              alert('App Installed!');
              window.close(); // Close popup after install
            }
          }
        }
      }

      // Optional: Register service worker for PWA
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then((reg) => console.log("Service Worker registered!", reg))
          .catch((err) => console.error("Service Worker registration failed:", err));
      }
    </script>
  </body>
</html>
