<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Window for PWA Installation Test</title>
    <link rel="manifest" href="https://aliothme.github.io/manifest.json">
</head>
<body>
    <h1>Test PWA Installation Theory v4</h1>
    <p>This page serves as the main window hosted on HTTPS (e.g., via GitHub Pages at aliothme.github.io). Click the button below to open a popup window for testing.</p>
    
    <button id="openPopup">Open Popup for PWA Install</button>

    <script>
        // Register service worker in main window only
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('https://aliothme.github.io/sw.js', { scope: '/' })
                .then(reg => console.log('Service Worker registered in main', reg))
                .catch(err => console.log('Service Worker error in main', err));
        }

        // Function to open the popup using a Blob URL for secure context inheritance
        document.getElementById('openPopup').addEventListener('click', function() {
            // Define the HTML content for the popup
            const popupContent = `
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Popup for PWA Installation</title>
                    <link rel="manifest" href="https://aliothme.github.io/manifest.json">
                </head>
                <body>
                    <h1>PWA Installation Test in Popup</h1>
                    <p>This popup is loaded via a secure Blob URL inheriting from the main HTTPS origin. The content below is injected via an iframe from permission.site to handle cross-origin constraints.</p>
                    
                    <!-- Iframe to inject permission.site content -->
                    <iframe src="https://permission.site/" width="100%" height="300" sandbox="allow-scripts allow-same-origin allow-popups allow-modals"></iframe>
                    
                    <button id="installPWA">Install PWA</button>
                    
                    <script>
                        // PWA installation logic in popup (inherits service worker from main window's origin)
                        let deferredPrompt;
                        
                        // Listen for beforeinstallprompt event (requires manifest and service worker from inherited origin)
                        window.addEventListener('beforeinstallprompt', (e) => {
                            e.preventDefault();
                            deferredPrompt = e;
                            document.getElementById('installPWA').style.display = 'block';
                            console.log('beforeinstallprompt fired in popup');
                        });
                        
                        // Handle install button click
                        document.getElementById('installPWA').addEventListener('click', async () => {
                            if (deferredPrompt) {
                                deferredPrompt.prompt();
                                const { outcome } = await deferredPrompt.userChoice;
                                if (outcome === 'accepted') {
                                    console.log('PWA installation accepted');
                                } else {
                                    console.log('PWA installation dismissed');
                                }
                                deferredPrompt = null;
                            } else {
                                alert('PWA installation prompt not available. Ensure the site meets PWA criteria (HTTPS, manifest, service worker).');
                            }
                        });
                        
                        // Note: The actual PWA manifest and service worker are served from aliothme.github.io. This Blob URL setup provides a secure context workaround.
                    <\/script>
                </body>
                </html>
            `;

            // Create a Blob from the content and generate a URL
            const blob = new Blob([popupContent], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);

            // Open popup with the Blob URL
            const popup = window.open(blobUrl, 'pwaPopup', 'width=600,height=400');

            if (popup) {
                console.log('Popup opened with secure Blob URL');
            } else {
                alert('Popup blocked. Please allow popups for this site.');
            }
        });
    </script>
</body>
</html>
