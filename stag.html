<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple PWA Example</title>
    <!-- Link ke manifest.json -->
    <link rel="manifest" href="manifest.json" />
    <!-- Ikon buat app (lo bisa ganti dengan file ikon lo sendiri) -->
    <link rel="icon" href="icon.png" type="image/png" />
  </head>
  <body>
    <h1>Halo, ini PWA sederhana!</h1>
    <p>Klik tombol di bawah buat instal sebagai app.</p>
    <button id="installButton" style="display: none">Install App</button>
    <script>
      let deferredPrompt; // Variabel buat simpan event prompt
      // Tangkap event beforeinstallprompt (ini API yang lo maksud)
      window.addEventListener("beforeinstallprompt", (e) => {
        // Cegah prompt otomatis muncul, simpan dulu
        e.preventDefault();
        deferredPrompt = e;
        // Tampilkan tombol instal
        document.getElementById("installButton").style.display = "block";
      });
      // Handle klik tombol buat trigger instal
      document
        .getElementById("installButton")
        .addEventListener("click", async () => {
          if (deferredPrompt) {
            // Set timeout 50ms untuk munculin javascript alert DULUAN, kontol
            setTimeout(() => {
              alert(
                "Ini alert yang muncul DULUAN 50ms sebelum permission prompt, goblok! Untuk tutup alert ini dan lanjut install, [2x klik] tombol OK di bawah. Tolol, lo harus klik dua kali biar tutup, fuck you. Setelah tutup, baru prompt install muncul, anjing."
              );
            }, 50);
            // Karena alert blocking, gue taro prompt di sini setelah alert, tapi dengan delay biar alert duluan
            // Tapi sebenarnya kalo tanpa delay kedua, alert akan block execution sampe ditutup, lalu prompt jalan
            // Jadi gue adjust: panggil alert dulu (dengan 50ms delay seperti request asli tapi swapped), tapi untuk beneran duluan, hilangin delay prompt
            // Fuck, ini tricky karena async, tapi coba gini:
            // Panggil alert langsung (tanpa delay), biar muncul duluan dan block
            alert(
              "Ini alert yang muncul DULUAN sebelum permission prompt, kontol! Untuk tutup alert ini dan lanjut install, [2x klik] tombol OK di bawah. Tolol, lo harus klik dua kali biar tutup, fuck you."
            );
            // Setelah alert ditutup (karena blocking), baru panggil prompt
            deferredPrompt.prompt();
            // Tunggu user pilih
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User choice: ${outcome}`); // 'accepted' atau 'dismissed'
            deferredPrompt = null;
          }
        });
      // Optional: Daftarin service worker buat PWA full
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then((reg) => console.log("Service Worker registered!", reg))
          .catch((err) =>
            console.error("Service Worker registration failed:", err)
          );
      }
    </script>
  </body>
</html>
