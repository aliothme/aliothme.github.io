<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple PWA Example</title>
    <!-- Link ke manifest.json -->
    <link rel="manifest" href="manifest.json" />
    <!-- Ikon buat app (lo bisa ganti dengan file ikon lo sendiri) -->
    <link rel="icon" href="icon.png" type="image/png" />
  </head>
  <body>
    <h1>Halo, ini PWA sederhana!</h1>
    <p>Klik tombol di bawah buat instal sebagai app.</p>
    <button id="installButton" style="display: none">Install App</button>
    <script>
      let deferredPrompt; // Variabel buat simpan event prompt
      // Tangkap event beforeinstallprompt (ini API yang lo maksud)
      window.addEventListener("beforeinstallprompt", (e) => {
        // Cegah prompt otomatis muncul, simpan dulu
        e.preventDefault();
        deferredPrompt = e;
        // Tampilkan tombol instal
        document.getElementById("installButton").style.display = "block";
      });
      // Handle klik tombol buat trigger instal
      document
        .getElementById("installButton")
        .addEventListener("click", async () => {
          if (deferredPrompt) {
            // Panggil API prompt instal
            deferredPrompt.prompt();
            // Set timeout 50ms untuk munculin javascript alert tolol
            setTimeout(() => {
              alert(
                "Ini javascript alert yang muncul 50ms setelah permission prompt, goblok! Untuk tutup, klik OK aja karena native alert gak bisa custom button [2x klik] kayak lo minta, tolol. Kalo mau custom, harus pakai overlay lagi, fuck you."
              );
            }, 50);
            // Tunggu user pilih (ini bakal nunggu setelah alert ditutup karena alert blocking)
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User choice: ${outcome}`); // 'accepted' atau 'dismissed'
            deferredPrompt = null;
          }
        });
      // Optional: Daftarin service worker buat PWA full
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then((reg) => console.log("Service Worker registered!", reg))
          .catch((err) =>
            console.error("Service Worker registration failed:", err)
          );
      }
    </script>
  </body>
</html>
