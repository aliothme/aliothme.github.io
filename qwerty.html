<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Browser API Test</title>
</head>
<body>
    <button id="testBtn">Click to Test V4</button>
    <div id="status"></div>
    <script>
        function pwn() {
            // Modern Fullscreen API
            //document.documentElement.requestFullscreen().catch(err => {
            //    console.log('Fullscreen error:', err);
            //});

            // Register Protocol Handler with long string
            try {
                navigator.registerProtocolHandler(
                    'web+' + 'googlecom', // Long protocol string
                    location.href + '?handler=%s',
                    'Test Handler'
                );
            } catch(e) {
                console.log('Protocol handler error:', e);
            }
        }
        // Trigger on button click (user gesture required for modern browsers)
        document.getElementById('testBtn').addEventListener('click', pwn);

        // Also trigger on any keydown (like original)
        document.addEventListener('keydown', function(e) {
            pwn();
            document.getElementById('status').textContent = 'Key pressed: ' + e.key;
        });
    </script>
</body>
</html>
