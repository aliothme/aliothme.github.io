<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buka Kalkulator ColorOS</title>
</head>
<body>
    <h1>Klik tombol di bawah untuk membuka Kalkulator</h1>
    
    <p>
        <a href="intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;component=com.coloros.calculator/com.coloros.calculator.Calculator;end">
            <button style="padding: 15px; font-size: 18px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;">
                Buka Kalkulator ColorOS
            </button>
        </a>
    </p>
    
    <p><small>Jika tidak terbuka, pastikan aplikasi kalkulator bawaan ColorOS terinstal di perangkat Android Anda.</small></p>
</body>
</html>
