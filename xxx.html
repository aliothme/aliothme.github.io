<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fullscree Bypass Notification & Hiding Ligimate URLS Bar</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px 40px;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <button id="fs">Fullscreen</button>
    <script>
      document.getElementById("fs").onclick = () => {
        document.documentElement.requestFullscreen();
      };
    </script>
  </body>
</html>
