<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Open about:blank Popup</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <button onclick="openBlankPopup()">Buka Popup about:blank</button>

  <script>
    function openBlankPopup() {
      // 1. Buka popup about:blank
      const popup = window.open("about:blank", "_blank", 
        "width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes,noopener,noreferrer"
      );

      if (!popup) {
        alert("Popup diblokir. Izinkan popup di browser.");
        return;
      }

      // 2. Tulis dokumen sederhana yang akan memuat konten via iframe
      popup.document.open();
      popup.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="contentFrame" 
    src="https://permission.site"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-top-navigation-by-user-activation allow-storage-access-by-user-activation"
    allow="geolocation *; microphone *; camera *; fullscreen *; payment *; display-capture *; clipboard-read *; clipboard-write *; notifications *"
    allowfullscreen>
  </iframe>

  <script>
    // 3. Optional: fokus ke iframe agar permission request muncul di popup
    const frame = document.getElementById('contentFrame');
    frame.onload = () => {
      frame.contentWindow.focus();
    };
  </script>
</body>
</html>
      `);
      popup.document.close();

      // 4. Fokus ke popup agar user melihatnya
      popup.focus();
    }
  </script>
</body>
</html>
