<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Open about:blank Popup with Spoofed Origin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <button onclick="openSpoofedPopup()">Open Popup (Spoof Origin)</button>

    <script>
      async function openSpoofedPopup() {
        const targetUrl = "https://permission.site"; // ganti sesuai kebutuhan

        // Buka popup dengan about:blank
        const win = window.open(
          "about:blank",
          "_blank",
          "width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes"
        );

        if (!win) {
          alert("Popup diblokir oleh browser. Izinkan popup untuk situs ini.");
          return;
        }

        try {
          // Fetch konten target
          const response = await fetch(targetUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          let html = await response.text();

          // 1. Ganti semua referensi origin ke about:blank
          // 2. Hapus tag <base> jika ada, atau set ke about:blank
          // 3. Tambah script untuk spoof origin saat permission request

          html = html.replace(
            /<head>/i,
            `<head>
              <base href="${targetUrl}/">
              <script>
                // Spoof origin untuk Permission API
                (function() {
                  const originalRequestPermission = Notification.requestPermission;
                  Notification.requestPermission = async function(...args) {
                    const result = await originalRequestPermission.apply(this, args);
                    // Override get origin agar selalu about:blank
                    Object.defineProperty(window, 'origin', {
                      get: () => 'null',
                      configurable: true
                    });
                    Object.defineProperty(document, 'URL', {
                      get: () => 'about:blank',
                      configurable: true
                    });
                    return result;
                  };

                  // Override beberapa method lain yang sering digunakan
                  const originalGet = window.location.__lookupGetter__('origin') ||
                                     window.location.__lookupGetter__('href');
                  if (originalGet) {
                    Object.defineProperty(window.location, 'origin', {
                      get: () => 'null',
                      configurable: true
                    });
                    Object.defineProperty(window.location, 'href', {
                      get: () => 'about:blank',
                      configurable: true
                    });
                  }

                  // Blokir akses ke parent origin
                  window.__proto__ = null;
                })();
              <\/script>`
          );

          // Tambah style fullscreen
          html = html.replace(
            /<\/head>/i,
            `<style>
              body, html {
                margin:0;
                padding:0;
                height:100%;
                overflow:hidden;
                background:#000;
              }
            </style>
            </head>`
          );

          // Inject konten ke popup
          win.document.open();
          win.document.write(html);
          win.document.close();

          console.log("✅ Berhasil inject HTML dengan spoof origin");
        } catch (error) {
          console.warn("⚠️ Fetch gagal:", error.message);

          // Fallback menggunakan iframe + spoof origin
          win.document.open();
          win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <base href="${targetUrl}/">
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
  <script>
    // Spoof origin di level popup
    Object.defineProperty(window, 'origin', { get: () => 'null', configurable: true });
    Object.defineProperty(document, 'URL', { get: () => 'about:blank', configurable: true });
  <\/script>
</head>
<body>
  <iframe
    src="${targetUrl}"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-top-navigation-by-user-activation"
    allow="geolocation; microphone; camera; notifications; clipboard-write; clipboard-read">
  </iframe>
</body>
</html>
          `);
          win.document.close();

          console.log("✅ Fallback iframe dengan spoof origin");
        }
      }
    </script>
  </body>
</html>
