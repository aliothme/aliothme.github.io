<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Popup about:blank dengan Permission Dialog about:blank</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <button onclick="openPopup()">Buka Popup V2</button>

  <script>
    async function openPopup() {
      // Buka about:blank
      const win = window.open('about:blank', 'permissionPopup', 
        'width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes'
      );

      if (!win) {
        alert('Popup diblokir. Izinkan popup untuk situs ini.');
        return;
      }

      try {
        // Fetch HTML dari permission.site
        const response = await fetch('https://permission.site');
        const html = await response.text();

        // Fix base URL agar resource (CSS, JS, gambar) tetap load dari permission.site
        const fixedHtml = html.replace(
          '<head>',
          `<head><base href="https://permission.site/">`
        ).replace(
          '</head>',
          `
          <style>
            body, html { margin:0; padding:0; height:100vh; overflow:hidden; }
          </style>
          </head>`
        );

        // Tulis HTML ke about:blank → origin tetap about:blank
        win.document.open();
        win.document.write(fixedHtml);
        win.document.close();

        console.log('Sukses: Konten dari permission.site di about:blank');

      } catch (error) {
        console.error('Fetch gagal:', error);

        // Fallback: Jika fetch diblok CORS, gunakan iframe (tapi origin tetap about:blank)
        win.document.open();
        win.document.write(`
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Permission Test</title>
  <style>
    body, html { margin:0; padding:0; height:100vh; overflow:hidden; }
    iframe { border:none; width:100%; height:100%; }
  </style>
</head>
<body>
  <iframe src="https://permission.site" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-top-navigation"></iframe>
</body>
</html>`);
        win.document.close();
      }
    }
  </script>
</body>
</html>
