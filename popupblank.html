<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Open about:blank Popup with Spoofed Origin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <button onclick="openSpoofedPopup()">Open Popup (Spoof Origin)</button>
    <script>
      async function fetchAndInlineResources(baseUrl, html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Inline stylesheets
        const styleLinks = doc.querySelectorAll('link[rel="stylesheet"]');
        for (const link of styleLinks) {
          const href = new URL(link.href, baseUrl).href;
          try {
            const response = await fetch(href);
            if (response.ok) {
              const css = await response.text();
              const style = doc.createElement('style');
              style.textContent = css;
              link.replaceWith(style);
            }
          } catch (e) {
            console.warn(`Failed to inline stylesheet ${href}: ${e}`);
          }
        }
        
        // Inline scripts
        const scripts = doc.querySelectorAll('script[src]');
        for (const script of scripts) {
          const src = new URL(script.src, baseUrl).href;
          try {
            const response = await fetch(src);
            if (response.ok) {
              const js = await response.text();
              const inlineScript = doc.createElement('script');
              inlineScript.textContent = js;
              script.replaceWith(inlineScript);
            }
          } catch (e) {
            console.warn(`Failed to inline script ${src}: ${e}`);
          }
        }
        
        return doc.documentElement.outerHTML;
      }

      async function openSpoofedPopup() {
        const targetUrl = "https://permission.site"; // ganti sesuai kebutuhan
        const win = window.open(
          "about:blank",
          "_blank",
          "width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes"
        );
        if (!win) {
          alert("Popup diblokir oleh browser. Izinkan popup untuk situs ini.");
          return;
        }
        try {
          const response = await fetch(targetUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          let html = await response.text();
          
          // Inline all resources to avoid CORS in null origin
          html = await fetchAndInlineResources(targetUrl, html);
          
          // Hack to bypass URL param checks (fix autofill/init error)
          html = html.replace(
            /<head>/i,
            `<head>
              <script>
                // Override URLSearchParams to provide dummy params
                const originalURLSearchParams = URLSearchParams;
                URLSearchParams = function(...args) {
                  const params = new originalURLSearchParams(...args);
                  if (params.get('typeId') === null) params.set('typeId', 'default');
                  if (params.get('itemId') === null) params.set('itemId', 'default');
                  return params;
                };
                // Force init if skipped
                window.addEventListener('load', () => {
                  if (typeof initialize === 'function') initialize();
                });
              <\/script>`
          );
          
          // Escape for srcdoc
          const escapedHtml = html.replace(/"/g, '&quot;');
          
          win.document.open();
          win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
  <script>
    Object.defineProperty(window, 'origin', { get: () => 'null', configurable: true });
    Object.defineProperty(document, 'URL', { get: () => 'about:blank', configurable: true });
  <\/script>
</head>
<body>
  <iframe
    srcdoc="${escapedHtml}"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
    allow="geolocation; microphone; camera; notifications; clipboard-write; clipboard-read; autoplay; fullscreen; display-capture">
  </iframe>
</body>
</html>
          `);
          win.document.close();
          console.log("✅ Berhasil inject via sandboxed srcdoc iframe dengan inlined resources dan param hack");
        } catch (error) {
          console.warn("⚠️ Fetch gagal:", error.message);
          // Fallback: Coba src langsung, tapi tambah allow-same-origin untuk avoid null origin CORS issues (hilang spoof murni, tapi mungkin work)
          win.document.open();
          win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <base href="${targetUrl}/">
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
  <script>
    Object.defineProperty(window, 'origin', { get: () => 'null', configurable: true });
    Object.defineProperty(document, 'URL', { get: () => 'about:blank', configurable: true });
  <\/script>
</head>
<body>
  <iframe
    src="${targetUrl}"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-same-origin"
    allow="geolocation; microphone; camera; notifications; clipboard-write; clipboard-read; autoplay; fullscreen; display-capture">
  </iframe>
</body>
</html>
          `);
          win.document.close();
          console.log("✅ Fallback sandboxed src iframe dengan allow-same-origin (mungkin leak origin, tapi functions work)");
        }
      }
    </script>
  </body>
</html>
