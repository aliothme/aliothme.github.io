<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Popup Data URL dengan Permission about:blank</title>
  <style> body { font-family: Arial, sans-serif; padding: 20px; } </style>
</head>
<body>
  <button onclick="openPopup()">Buka Popup</button>
  <script>
    async function openPopup() {
      try {
        const response = await fetch('https://permission.site');
        let html = await response.text();
        html = html.replace('<head>', `<head><base href="https://permission.site/">`)
                   .replace('</head>', '<style>body,html{margin:0;padding:0;height:100vh;overflow:hidden;}</style></head>');
        const encoded = encodeURIComponent(html);
        window.open(`data:text/html;charset=utf-8,${encoded}`, 'permissionPopup', 'width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes');
      } catch (e) {
        alert('Fetch gagal: ' + e.message);
      }
    }
  </script>
</body>
</html>
