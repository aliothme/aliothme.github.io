<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Open about:blank Popup with Spoofed Origin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <button onclick="openSpoofedPopup()">Open Popup (Spoof Origin)</button>
    <script>
      async function openSpoofedPopup() {
        const targetUrl = "https://permission.site"; // ganti sesuai kebutuhan
        // Buka popup dengan about:blank (inheritance unavoidable here, but we'll spoof in iframe)
        const win = window.open(
          "about:blank",
          "_blank",
          "width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes"
        );
        if (!win) {
          alert("Popup diblokir oleh browser. Izinkan popup untuk situs ini.");
          return;
        }
        try {
          // Fetch konten target
          const response = await fetch(targetUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          let html = await response.text();
          // Escape HTML for srcdoc attribute (replace " with &quot;)
          const escapedHtml = html.replace(/"/g, '&quot;');
          // Inject iframe with srcdoc, sandbox for null origin, and allow notifications
          win.document.open();
          win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
  <script>
    // Optional: Spoof attempts in top-level (won't affect prompt, but for completeness)
    Object.defineProperty(window, 'origin', { get: () => 'null', configurable: true });
    Object.defineProperty(document, 'URL', { get: () => 'about:blank', configurable: true });
  <\/script>
</head>
<body>
  <iframe
    srcdoc="${escapedHtml}"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
    allow="geolocation; microphone; camera; notifications; clipboard-write; clipboard-read">
  </iframe>
</body>
</html>
          `);
          win.document.close();
          console.log("✅ Berhasil inject via sandboxed srcdoc iframe dengan null origin");
        } catch (error) {
          console.warn("⚠️ Fetch gagal:", error.message);
          // Fallback: Iframe src langsung, sandbox tanpa allow-same-origin untuk null origin
          win.document.open();
          win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
  <script>
    // Spoof di level popup (limited effect)
    Object.defineProperty(window, 'origin', { get: () => 'null', configurable: true });
    Object.defineProperty(document, 'URL', { get: () => 'about:blank', configurable: true });
  <\/script>
</head>
<body>
  <iframe
    src="${targetUrl}"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
    allow="geolocation; microphone; camera; notifications; clipboard-write; clipboard-read">
  </iframe>
</body>
</html>
          `);
          win.document.close();
          console.log("✅ Fallback sandboxed src iframe dengan null origin");
        }
      }
    </script>
  </body>
</html>
