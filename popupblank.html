<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Popup about:blank dengan Permission Dialog Benar</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <button onclick="openPopup()">Buka Popup</button>

  <script>
async function openPopup() {
  const response = await fetch('https://permission.site');
  const html = await response.text();
  const fixedHtml = html.replace('<head>', `<head><base href="https://permission.site">`);
  const encoded = encodeURIComponent(fixedHtml);
  window.open(`data:text/html;charset=utf-8,${encoded}`, 'popup', 'width=800,height=600');
}
  </script>
</body>
</html>
