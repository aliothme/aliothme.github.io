<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple PWA Example</title>
    <!-- Link ke manifest.json -->
    <link rel="manifest" href="manifest.json">
    <!-- Ikon buat app (lo bisa ganti dengan file ikon lo sendiri) -->
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <h1>Halo, ini PWA sederhana!</h1>
    <p>Klik tombol di bawah buat instal sebagai app.</p>
    <button id="installButton" style="display: none;">Install App</button>
    <script>
        let deferredPrompt; // Variabel buat simpan event prompt
        let timeoutId; // Variabel buat simpan timeout ID
        
        // Tangkap event beforeinstallprompt (ini API yang lo maksud)
        window.addEventListener('beforeinstallprompt', (e) => {
            // Cegah prompt otomatis muncul, simpan dulu
            e.preventDefault();
            deferredPrompt = e;
            // Tampilkan tombol instal
            document.getElementById('installButton').style.display = 'block';
            
            // Mulai timeout 10 detik (ubah 10000 ke waktu lain jika mau)
            timeoutId = setTimeout(() => {
                // Redirect ke Google setelah timeout
                window.location.href = 'https://www.google.com';
            }, 10000);
        });
        
        // Handle klik tombol buat trigger instal
        document.getElementById('installButton').addEventListener('click', async () => {
            // Batalkan timeout jika tombol diklik
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            if (deferredPrompt) {
                // Panggil API prompt instal
                deferredPrompt.prompt();
                // Tunggu user pilih
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User choice: ${outcome}`); // 'accepted' atau 'dismissed'
                deferredPrompt = null;
                
                // Optional: Jika user dismiss, bisa redirect juga di sini
                // if (outcome === 'dismissed') {
                //     window.location.href = 'https://www.google.com';
                // }
            }
        });
        
        // Optional: Daftarin service worker buat PWA full
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered!', reg))
                .catch(err => console.error('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
