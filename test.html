<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chrome UI Spoofing – Security Demo</title>
<style>
body { font-family: sans-serif }
button { margin: 6px; padding: 10px }
#log { white-space: pre-wrap; background:#111; color:#0f0; padding:10px }
</style>
</head>
<body>

<h2>Chrome Download / UI Spoofing (Mitigation Demo)</h2>

<button id="twitter">Twitter Spoof Test</button>
<button id="opener">Opener Hijack Test</button>

<div id="log"></div>

<script>
const log = msg => {
  document.getElementById('log').textContent += msg + "\n"
}

document.getElementById('twitter').onclick = () => {
  log("[*] Opening twitter.com")
  const w = window.open("https://twitter.com", "_blank")

  setTimeout(() => {
    try {
      w.location.href = "data:text/html,<h1>Spoof</h1>"
      log("[!] Attempted data: navigation")
    } catch (e) {
      log("[✓] Blocked by browser: " + e)
    }
  }, 1000)
}

document.getElementById('opener').onclick = () => {
  log("[*] Opening child window")
  const c = window.open("child.html", "_blank")

  setTimeout(() => {
    if (!c || c.opener === null) {
      log("[✓] window.opener is NULL (noopener enforced)")
    } else {
      log("[!] opener still exists (old browser?)")
    }
  }, 1000)
}
</script>
</body>
</html>
