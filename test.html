<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open about:blank</title>
</head>
<body>

<button onclick="openPopup()">Open Popup</button>

<script>
function openPopup() {
  window.open(
    "about:blank",
    "popup",
    "width=600,height=400,left=200,top=200"
  );
}
</script>

</body>
</html>
