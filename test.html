<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open about:blank</title>
</head>
<body>

<button onclick="openPopup()">Open Popup 5</button>

<script>
function openPopup() {
  const win = window.open(
    "about:blank",
    "popup",
    "width=600,height=400,left=200,top=200"
  );

  if (!win) {
    alert("Popup blocked");
    return;
  }

  win.document.open();
  win.document.write(`
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Popup with iframe</title>
</head>
<body>
  <iframe src="https://permission.site"></iframe>
</body>
</html>
  `);
  win.document.close();
}
</script>


</body>
</html>
