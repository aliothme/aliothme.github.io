<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API PopUp & Pointer Lock & Fullscreen</title>
</head>
<body>
    <button id="btnPopup">Buka PopUp (Delay 0.5ms)</button>
    <button id="btnPointerLock">Aktifkan Pointer Lock</button>
    <button id="btnFullscreen">Aktifkan Fullscreen</button>

    <script>
        // API PopUp Window dengan delay 2 detik
        document.getElementById('btnPopup').addEventListener('click', function() {
            setTimeout(function() {
                window.open('https://www.google.com', 'popup', 'width=600,height=400');
            }, 500);
        });

        // API Pointer Lock
        document.getElementById('btnPointerLock').addEventListener('click', function() {
            document.body.requestPointerLock();
        });

        // Keluar dari Pointer Lock dengan menekan ESC
        document.addEventListener('pointerlockchange', function() {
            if (document.pointerLockElement === document.body) {
                console.log('Pointer Lock aktif');
            } else {
                console.log('Pointer Lock nonaktif');
            }
        });

        // API Fullscreen
        document.getElementById('btnFullscreen').addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
