<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen AlertDialog di HTML</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        dialog {
            border: none;
            padding: 0;
            margin: 0;
            width: 100vw;   /* Full width viewport */
            height: 100vh;  /* Full height viewport */
            max-width: 100vw;
            max-height: 100vh;
            background: #fff; /* Background putih full screen */
            position: fixed;
            top: 0;
            left: 0;
            overflow: auto; /* Jika konten panjang, bisa scroll */
        }
        /* Backdrop gelap (native dari <dialog>) tetap ada, tapi kita override sedikit */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.8); /* Lebih gelap */
        }
        .dialog-header {
            background: #1976d2;
            color: white;
            padding: 20px;
            font-size: 24px;
            text-align: center;
        }
        .dialog-content {
            padding: 40px;
            font-size: 18px;
            text-align: center;
        }
        .dialog-actions {
            padding: 20px;
            text-align: center;
            background: #f5f5f5;
            position: fixed;
            bottom: 0;
            width: 100%;
            left: 0;
        }
        button {
            padding: 12px 24px;
            margin: 0 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-cancel {
            background: #e0e0e0;
            color: black;
        }
        .btn-ok {
            background: #1976d2;
            color: white;
        }
    </style>
</head>
<body>
    <button onclick="showDialog()">Tampilkan Full Screen AlertDialog</button>

    <dialog id="myDialog">
        <div class="dialog-header">Sign in required</div>
        <div class="dialog-content">
            <h2>You need to sign in to access this feature.</h2>
            <p>Ini adalah contoh dialog yang memenuhi seluruh layar laptop/desktop seperti fullscreen.</p>
            <!-- Bisa tambah gambar atau konten lain di sini -->
        </div>
        <div class="dialog-actions">
            <button class="btn-cancel" onclick="closeDialog()">Cancel</button>
            <button class="btn-ok" onclick="closeDialog()">OK</button>
        </div>
    </dialog>

    <script>
        const dialog = document.getElementById('myDialog');

        function showDialog() {
            dialog.showModal();  // Tampilkan sebagai modal full screen
        }

        function closeDialog() {
            dialog.close();
        }

        // Tutup jika klik backdrop (luar konten)
        dialog.addEventListener('click', (e) => {
            if (e.target === dialog) {
                dialog.close();
            }
        });
    </script>
</body>
</html>
