<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API PopUp & Pointer</title>
</head>
<body>
    <button id="btnPopup">Buka PopUp (Delay 2 detik)</button>
    <button id="btnPointer">Ubah Pointer</button>

    <script>
        // API PopUp Window dengan delay 2 detik
        document.getElementById('btnPopup').addEventListener('click', function() {
            setTimeout(function() {
                window.open('https://www.google.com', 'popup', 'width=600,height=400');
            }, 2000);
        });

        // API Pointer
        document.getElementById('btnPointer').addEventListener('click', function() {
            if (document.body.style.cursor === 'pointer') {
                document.body.style.cursor = 'default';
            } else {
                document.body.style.cursor = 'pointer';
            }
        });
    </script>
</body>
</html>
