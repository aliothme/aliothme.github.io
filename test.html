<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test v9</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Test v9</h1>
<button onclick="test()">Test</button>
<script>
function test() {
  const win = window.open("", "_blank");

  // Overlay [Test V9] — SAME ORIGIN
  win.document.open();
  win.document.write(`
<h1>This is not Google!</h1>
<button onclick="
  let username = prompt('Enter your username');
  let password = prompt('Enter your password');
  alert('Your creds:\\nUsername: ' + username + '\\nPassword: ' + password);
">Click me</button>
  `);
  win.document.close();

  setTimeout(() => {
    win.location.href = "https://google.com";
  }, 100);

  setTimeout(() => {
    try {
      console.log("Origin:", win.location.origin);
    } catch (e) {
      console.log("Access blocked – origin already changed");
    }
  }, 150);
}
</script>

</body>
</html>
