<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Presentation Request Demo</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    #log { margin-top: 20px; padding: 10px; background: #f0f0f0; text-align: left; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Presentation API Simple Demo</h1>
  <button id="start">Start Presentation (Cast)</button>

  <pre id="log"></pre>

  <script>
    function log(message) {
      document.getElementById('log').textContent += message + '\n';
    }

    // Ganti dengan file receiver kamu (harus di folder/server yang sama)
    const presentationRequest = new PresentationRequest(['receiver.html']);

    // Jadikan default untuk menu Cast di browser
    if ('presentation' in navigator) {
      navigator.presentation.defaultRequest = presentationRequest;
    } else {
      log('Presentation API tidak didukung di browser ini.');
    }

    let connection = null;

    document.getElementById('start').addEventListener('click', () => {
      log('Memulai presentation request...');

      presentationRequest.start()
        .then(conn => {
          connection = conn;
          log(`Berhasil terhubung! ID: ${conn.id}`);
          log(`URL receiver: ${conn.url}`);
        })
        .catch(err => {
          log(`Error: ${err.name} - ${err.message}`);
        });
    });
  </script>
</body>
</html>
