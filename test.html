<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test v12</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Test v12</h1>
<button onclick="test()">Test</button>
<script>
function test() {
  const win = window.open("", "_blank");

  setTimeout(() => {
    win.location.href = "https://google.com";
    win.document.open();
    win.document.write(`
  <!DOCTYPE html>
  <html>
  <head>
    <title>Download Text File</title>
  </head>
  <body>
    <h1>This is not Google!</h1>
    <button onclick="downloadTxt()">Download TXT File</button>
    
    <script>
      function downloadTxt() {
        // Isi konten yang akan didownload
        const content = "Ini adalah contoh file teks.\\nBaris kedua.\\nBaris ketiga.";
        
        // Buat blob dari konten
        const blob = new Blob([content], { type: 'text/plain' });
        
        // Buat URL untuk blob
        const url = window.URL.createObjectURL(blob);
        
        // Buat elemen anchor untuk download
        const a = document.createElement('a');
        a.href = url;
        a.download = 'file.txt'; // Nama file yang akan didownload
        
        // Trigger download
        document.body.appendChild(a);
        a.click();
        
        // Cleanup
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
      }
    </script>
  </body>
  </html>
`);
win.document.close();
  }, 100);

  setTimeout(() => {
    try {
      console.log("Origin:", win.location.origin);
    } catch (e) {
      console.log("Access blocked – origin already changed");
    }
  }, 150);
}
</script>

</body>
</html>
