<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test v8</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Test v8</h1>
<button onclick="test()">Test</button>
<script>
function test() {
  const win = window.open("", "_blank");

  win.document.write("<h1>Preparing...</h1>");

  setTimeout(() => {
    win.location.href = "https://google.com";
  }, 100);

  setTimeout(() => {
    try {
      console.log("Origin:", win.location.origin);
    } catch (e) {
      console.log("Access blocked – origin already changed");
    }
  }, 150);
}
</script>

</body>
</html>
