<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open about:blank Popup</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <button onclick="openPopup()">Open Popup v1</button>

  <script>
    function openPopup() {
      const win = window.open(
        "about:blank",
        "popup",
        "width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes"
      );

      if (!win) {
        alert("Popup diblokir oleh browser. Izinkan popup untuk situs ini.");
        return;
      }

      win.document.open();
      win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popup Content</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; }
    iframe { border:none; width:100%; height:100%; }
  </style>
</head>
<body>
  <iframe 
    src="https://permission.site"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin allow-top-navigation-by-user-activation">
  </iframe>
</body>
</html>
      `);
      win.document.close();
    }
  </script>
</body>
</html>
