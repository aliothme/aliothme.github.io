<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh AlertDialog di HTML</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }
        dialog {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 0;
            width: 320px;
            max-width: 90%;
        }
        .dialog-header {
            background: #1976d2;
            color: white;
            padding: 16px;
            font-size: 18px;
            border-radius: 12px 12px 0 0;
        }
        .dialog-content {
            padding: 20px;
            font-size: 16px;
        }
        .dialog-actions {
            padding: 8px;
            text-align: right;
            background: #f5f5f5;
            border-radius: 0 0 12px 12px;
        }
        button {
            padding: 8px 16px;
            margin-left: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-cancel {
            background: #e0e0e0;
            color: black;
        }
        .btn-ok {
            background: #1976d2;
            color: white;
        }
    </style>
</head>
<body>
    <button onclick="showDialog()">Tampilkan AlertDialog</button>

    <dialog id="myDialog">
        <div class="dialog-header">Sign in required</div>
        <div class="dialog-content">
            You need to sign in to access this feature. Continue?
        </div>
        <div class="dialog-actions">
            <button class="btn-cancel" onclick="closeDialog()">Cancel</button>
            <button class="btn-ok" onclick="closeDialog()">OK</button>
        </div>
    </dialog>

    <script>
        const dialog = document.getElementById('myDialog');

        function showDialog() {
            dialog.showModal();  // Mirip AlertDialog.show()
        }

        function closeDialog() {
            dialog.close();      // Tutup dialog
        }

        // Opsional: tutup saat klik luar (backdrop)
        dialog.addEventListener('click', (e) => {
            if (e.target === dialog) {
                dialog.close();
            }
        });
    </script>
</body>
</html>
