<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank → google.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<button onclick="openGoogle()">Open Google</button>

<script>
function openGoogle() {
  // 1. Buka window baru (awal: about:blank)
  const win = window.open("", "_blank");

  if (!win) {
    alert("Popup blocked");
    return;
  }

  // 2. Navigasi ke google.com
  win.location.href = "https://www.google.com";
}
</script>

</body>
</html>
