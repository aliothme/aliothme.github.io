<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open about:blank Popup with Fetched Content</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <button onclick="openPopup()">Open Popup 3</button>

  <script>
    async function openPopup() {
      const url = 'https://permission.site';

      const win = window.open(
        'about:blank',
        'popup',
        'width=800,height=600,left=200,top=100,resizable=yes,scrollbars=yes'
      );

      if (!win) {
        alert('Popup diblokir oleh browser. Izinkan popup untuk situs ini.');
        return;
      }

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        let html = await response.text();

        // Tambah style fullscreen ke HTML yang diinject (fix error body null)
        html = html.replace('</body>', '<style>body, html { margin:0; padding:0; height:100%; overflow:hidden; }</style></body>');

        win.document.open();
        win.document.write(html);
        win.document.close();

        console.log('Berhasil fetch & inject HTML langsung');
      } catch (error) {
        console.warn('Fetch gagal (kemungkinan CORS):', error);

        // Fallback ke iframe (seperti kode awal, tapi improved)
        win.document.open();
        win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popup Fallback</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; }
    iframe { border:none; width:100%; height:100%; }
  </style>
</head>
<body>
  <iframe 
    src="https://permission.site"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-top-navigation-by-user-activation">
  </iframe>
</body>
</html>
        `);
        win.document.close();

        console.log('Fallback ke iframe berhasil');
      }
    }
  </script>
</body>
</html>
