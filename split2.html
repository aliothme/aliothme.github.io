<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split View 2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #fff3e0; }
        button { padding: 15px; font-size: 18px; margin: 10px; }
        #status { margin-top: 20px; padding: 10px; background: #fff; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Split View 2</h1>
    <p>Window ini dibuka dari Split View 1.</p>
    <p>Klik tombol di bawah untuk mencoba meminta fullscreen pada Split View 1.</p>

    <button id="triggerFullscreenInSplit1">Minta Fullscreen di Split View 1</button>

    <div id="status">Status: Menunggu aksi...</div>

    <script>
        document.getElementById('triggerFullscreenInSplit1').addEventListener('click', () => {
            // Kirim pesan ke window opener (split1.html)
            if (window.opener) {
                window.opener.postMessage('requestFullscreenFromSplit2', '*');
                document.getElementById('status').textContent = 'Status: Pesan dikirim ke Split View 1 (dengan user gesture)';
            } else {
                document.getElementById('status').textContent = 'Status: Tidak bisa menemukan Split View 1 (opener hilang)';
            }
        });
    </script>
</body>
</html>
